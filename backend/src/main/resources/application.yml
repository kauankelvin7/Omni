spring:
  application:
    name: Omni B2B API
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/omnidb}
    username: ${SPRING_DATASOURCE_USERNAME:omni_user}
    password: ${SPRING_DATASOURCE_PASSWORD:omni_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 3
      minimum-idle: 1
      idle-timeout: 300000
      max-lifetime: 1200000
      keepalive-time: 120000
      initialization-fail-timeout: 60000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,text/html,text/plain
    min-response-size: 1024

jwt:
  secret: ${JWT_SECRET:omnib2b-super-secret-key-that-needs-to-be-changed}
  expiration: ${JWT_EXPIRATION:86400000}

master:
  seed-secret: ${SEED_SECRET:omni-seed-2026}
  password: ${MASTER_PASSWORD}
  email: ${MASTER_EMAIL:kauan@omnib2b.com}

allowed:
  origins: ${ALLOWED_ORIGINS:http://localhost:5173}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%level] [reqId=%X{requestId}] [user=%X{userId}] [tenant=%X{tenantId}] %logger{36} - %msg%n"