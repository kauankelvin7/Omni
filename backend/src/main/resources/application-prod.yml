spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://db:5432/omni_db}
    username: ${DATABASE_USER:omni_user}
    password: ${DATABASE_PASSWORD:omni_password}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

jwt:
  secret: ${JWT_SECRET}
  # No default secret in production!

master:
  seed-secret: ${SEED_SECRET}
  email: ${MASTER_EMAIL}
  password: ${MASTER_PASSWORD}
